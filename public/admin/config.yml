backend:
  name: github
  repo: cothme/St-Jude-Landing-Page
  branch: main
  squash_merges: true
  base_url: https://st-jude-landing-page-production.up.railway.app
  auth_endpoint: auth
  # Keep Open Authoring disabled so GitHub users without repo write access cannot submit edits through the CMS.

# Local proxy support is only used on localhost by Decap CMS.
local_backend: true

publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads
site_url: https://st-jude-landing-page-production.up.railway.app
display_url: https://st-jude-landing-page-production.up.railway.app
logo_url: /stjude-logo.png
locale: en

editor:
  preview: false

commit_messages:
  create: "cms: create {{collection}} {{slug}}"
  update: "cms: update {{collection}} {{slug}}"
  delete: "cms: delete {{collection}} {{slug}}"
  uploadMedia: "cms: upload {{path}}"
  deleteMedia: "cms: delete {{path}}"
  openAuthoring: "cms: open authoring {{message}}"

collections:
  - name: website
    label: Website
    label_singular: Website
    description: Edit the public website content used by the Vite build.
    files:
      - name: site_content
        label: Site Content
        file: src/content/siteContent.json
        format: json
        preview_path: /
        fields:
          - name: site
            label: Site Settings
            widget: object
            fields:
              - { name: shortName, label: Short Name, widget: string }
              - { name: subtitle, label: Navbar Subtitle, widget: string }
              - { name: fullName, label: Full Name, widget: string }
              - { name: tagline, label: Tagline, widget: string }
              - { name: summary, label: Footer Summary, widget: text }
              - { name: logo, label: Logo, widget: image }
              - { name: logoAlt, label: Logo Alt Text, widget: string }
              - name: contact
                label: Contact Details
                widget: object
                fields:
                  - { name: phone, label: Phone Display, widget: string }
                  - { name: phoneHref, label: Phone Link, widget: string }
                  - { name: email, label: Email Display, widget: string }
                  - { name: emailHref, label: Email Link, widget: string }
                  - { name: address, label: Address, widget: text, required: false }

          - name: navigation
            label: Navigation
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: Link, widget: string }

          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: body, label: Body, widget: text }
              - name: primaryCta
                label: Primary Button
                widget: object
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - name: secondaryCta
                label: Secondary Button
                widget: object
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - {
                  name: highlights,
                  label: Highlights,
                  widget: list,
                  field: { name: item, label: Highlight, widget: string },
                }
              - name: floatingCard
                label: Floating Card
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: copy, label: Copy, widget: string }
              - name: snapshot
                label: Care Snapshot
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: heading, label: Heading, widget: string }
                  - name: stats
                    label: Stats
                    widget: list
                    summary: "{{fields.value}} - {{fields.label}}"
                    fields:
                      - { name: value, label: Value, widget: string }
                      - { name: label, label: Label, widget: string }
                  - { name: rhythmTitle, label: Rhythm Title, widget: string }
                  - { name: rhythmBadge, label: Rhythm Badge, widget: string }
                  - {
                      name: rhythmItems,
                      label: Rhythm Items,
                      widget: list,
                      field: { name: item, label: Item, widget: string },
                    }
                  - {
                      name: values,
                      label: Values,
                      widget: list,
                      field: { name: item, label: Value, widget: string },
                    }

          - name: about
            label: About
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - {
                  name: paragraphs,
                  label: Paragraphs,
                  widget: list,
                  field: { name: paragraph, label: Paragraph, widget: text },
                }
              - name: principles
                label: Principles
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - name: icon
                    label: Icon
                    widget: select
                    options:
                      - { label: Shield, value: shield }
                      - { label: Helping Hands, value: hands }
                      - { label: Family, value: family }
                  - { name: title, label: Title, widget: string }
                  - { name: copy, label: Copy, widget: text }

          - name: services
            label: Services
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: copy, label: Copy, widget: text }
              - name: items
                label: Service Cards
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - name: icon
                    label: Icon
                    widget: select
                    options:
                      - { label: Brain, value: brain }
                      - { label: Home, value: home }
                      - { label: Mobility, value: mobility }
                      - { label: Capsules, value: capsules }
                      - { label: Care, value: care }
                      - { label: Comments, value: comments }
                  - { name: title, label: Title, widget: string }
                  - { name: copy, label: Copy, widget: text }

          - name: whyChooseUs
            label: Why Choose Us
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: copy, label: Copy, widget: text }
              - {
                  name: reasons,
                  label: Reasons,
                  widget: list,
                  field: { name: reason, label: Reason, widget: text },
                }

          - name: facilities
            label: Facilities
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: copy, label: Copy, widget: text }
              - name: spaces
                label: Facility Cards
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - name: icon
                    label: Icon
                    widget: select
                    options:
                      - { label: Moon, value: moon }
                      - { label: Sun, value: sun }
                      - { label: Leaf, value: leaf }
                  - { name: title, label: Title, widget: string }
                  - { name: copy, label: Copy, widget: text }
                  - name: gradient
                    label: Placeholder Gradient
                    widget: select
                    options:
                      - { label: Harbor to Mist, value: harbor-mist }
                      - { label: Sage to Linen, value: sage-linen }
                      - { label: Moss to Cream, value: moss-cream }
                  - {
                      name: image,
                      label: Photo,
                      widget: image,
                      required: false,
                    }
                  - {
                      name: imageAlt,
                      label: Photo Alt Text,
                      widget: string,
                      required: false,
                    }

          - name: contact
            label: Contact Section
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: copy, label: Copy, widget: text }
              - name: detailCards
                label: Detail Cards
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - name: icon
                    label: Icon
                    widget: select
                    options:
                      - { label: Phone, value: phone }
                      - { label: Email, value: email }
                      - { label: Location, value: location }
                  - { name: title, label: Title, widget: string }
                  - name: detailKey
                    label: Detail Source
                    widget: select
                    options:
                      - { label: Phone, value: phone }
                      - { label: Email, value: email }
                      - { label: Address, value: address }
              - name: form
                label: Inquiry Form
                widget: object
                fields:
                  - {
                      name: relationships,
                      label: Relationship Options,
                      widget: list,
                      field:
                        {
                          name: relationship,
                          label: Relationship,
                          widget: string,
                        },
                    }
                  - {
                      name: successMessage,
                      label: Success Message,
                      widget: text,
                    }

          - name: footer
            label: Footer
            widget: object
            fields:
              - name: links
                label: Footer Links
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - { name: copyright, label: Copyright Text, widget: string }
